name: Update agenda

on:
  workflow_dispatch:

  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate agenda.json
        run: npm run build

      - name: Commit agenda.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Mise à jour automatique de agenda.json"
